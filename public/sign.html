<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign · DeoDap eSign</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .signbar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; padding: 12px 22px; box-shadow: 0 -2px 10px rgba(0,0,0,.05); z-index: 20; }
    .canvas-area.sign { height: calc(100vh - 57px - 66px); }
    .pill { background: #eef2ff; color: #3730a3; border-radius: 999px; padding: 5px 12px; font-weight: 600; font-size: 13px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="dot"></span> DeoDap&nbsp;eSign</div>
    <div class="right"><span id="who" class="muted small"></span></div>
  </div>

  <div id="banner" style="padding:14px 22px 0"></div>
  <div class="canvas-area sign" id="canvas"><div class="empty">Loading document…</div></div>

  <div class="signbar" id="signbar" style="display:none">
    <div class="flex"><span class="pill" id="progress">0 of 0</span><span class="muted small" id="hint">Click the highlighted fields to fill them in.</span></div>
    <div class="flex">
      <button class="btn danger" id="declineBtn">Decline</button>
      <button class="btn primary" id="finishBtn">Finish &amp; submit</button>
    </div>
  </div>

  <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

  <script src="/js/common.js"></script>
  <script src="/js/sign.js"></script>
</body>
</html>
