<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeoDap eSign — Sign & email PDFs in your browser</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
  :root{--blue:#2563eb;--blue-d:#1d4ed8;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--bg:#f7f8fb;--green:#16a34a;--red:#dc2626;}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5}
  a{color:var(--blue);text-decoration:none}.muted{color:var(--muted)}.small{font-size:12px}h1,h2,h3{margin:0 0 .5em;line-height:1.25}
  .topbar{display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:1px solid var(--line);padding:11px 20px;position:sticky;top:0;z-index:30;gap:12px;flex-wrap:wrap}
  .brand{font-weight:800;font-size:18px;color:var(--blue);display:flex;gap:8px;align-items:center}
  .brand .dot{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#2563eb,#7c3aed)}
  .right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 15px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:.12s;white-space:nowrap}
  .btn:hover{border-color:#cbd5e1;background:#fafbff}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.primary:hover{background:var(--blue-d)}
  .btn.green{background:var(--green);border-color:var(--green);color:#fff}.btn.danger{color:var(--red);border-color:#f3c9c9}.btn.sm{padding:5px 10px;font-size:12.5px}.btn:disabled{opacity:.5;cursor:not-allowed}
  input,select,textarea{font:inherit;color:var(--ink);width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff}
  input:focus,textarea:focus,select:focus{outline:2px solid #bfdbfe;border-color:var(--blue)}
  .workspace{display:grid;grid-template-columns:288px 1fr;height:calc(100vh - 55px)}
  .sidebar{background:#fff;border-right:1px solid var(--line);overflow:auto;padding:16px}
  .sidebar h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:16px}
  .canvas-area{overflow:auto;padding:24px;background:#eceef3}
  .page-wrap{position:relative;margin:0 auto 20px;box-shadow:0 2px 12px rgba(0,0,0,.12);background:#fff;width:max-content}
  .page-wrap canvas{display:block}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .recip-item{display:flex;align-items:center;gap:8px;padding:7px;border:1px solid var(--line);border-radius:8px;margin-bottom:7px;cursor:pointer}
  .recip-item.active{border-color:var(--blue);background:#f5f8ff}
  .recip-item .swatch{width:14px;height:14px;border-radius:4px;flex:none}
  .recip-item .info{flex:1;min-width:0}.recip-item .info b{display:block;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .recip-item .info .small{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .palette{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .palette button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:9px 6px;font-size:12.5px;font-weight:600;cursor:pointer}
  .palette button.active{border-color:var(--blue);background:#f5f8ff;color:var(--blue)}.palette button:disabled{opacity:.4;cursor:not-allowed}
  .field{position:absolute;border:1.5px dashed;border-radius:5px;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:move;user-select:none;overflow:visible}
  .field .lbl{pointer-events:none;padding:0 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .field .del{position:absolute;top:-9px;right:-9px;width:18px;height:18px;border-radius:50%;background:#dc2626;color:#fff;border:none;cursor:pointer;font-size:12px;line-height:1;display:none}
  .field .rz{position:absolute;right:-7px;bottom:-7px;width:14px;height:14px;border-radius:3px;background:#fff;border:2px solid currentColor;cursor:nwse-resize}
  .field:hover .del{display:block}
  .sfield{position:absolute;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;overflow:hidden}
  .sfield.todo{border:1.5px dashed var(--blue);background:rgba(37,99,235,.08);color:var(--blue)}
  .sfield.done{border:1px solid var(--green);background:rgba(22,163,74,.06)}
  .sfield.other{border:1.5px dashed #cbd5e1;background:rgba(148,163,184,.10);color:#94a3b8}
  .sfield img{max-width:100%;max-height:100%}.sfield input{border:none;background:transparent;padding:2px 4px;height:100%;font-weight:600;width:100%}
  .dropzone{max-width:580px;margin:9vh auto;background:#fff;border:2px dashed #c7d2fe;border-radius:16px;padding:44px 28px;text-align:center}
  .dropzone.drag{border-color:var(--blue);background:#f5f8ff}
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.show{display:flex}.modal{background:#fff;border-radius:14px;max-width:560px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal .head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
  .modal .body{padding:18px 20px}.x{cursor:pointer;border:none;background:none;font-size:22px;color:var(--muted);line-height:1}
  .pad-canvas{width:100%;height:200px;touch-action:none;border:1px solid var(--line);border-radius:10px;background:#fff;display:block;cursor:crosshair}
  .pad-tabs{display:flex;gap:6px;margin-bottom:12px}.type-preview{height:200px;display:grid;place-items:center;font-size:46px;color:#13294b;border:1px solid var(--line);border-radius:10px}
  .flex{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}
  .pill{background:#eef2ff;color:#3730a3;border-radius:999px;padding:5px 12px;font-weight:600;font-size:13px}
  label.fld{display:block;margin-bottom:12px}label.fld span{display:block;font-weight:600;margin-bottom:5px;font-size:13px}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:11px 18px;border-radius:10px;opacity:0;transition:.25s;pointer-events:none;z-index:99;max-width:90vw;text-align:center}
  #toast.show{opacity:1}#toast.err{background:#b91c1c}
  .banner{padding:11px 16px;border-radius:10px;margin:14px 0;font-weight:600}.banner.ok{background:#e8f6ee;color:#15803d}.banner.info{background:#e8eefc;color:#1e40af}
  .done-screen{max-width:540px;margin:6vh auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:32px;text-align:center}
  .hintbox{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:12px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="dot"></span> DeoDap&nbsp;eSign</div>
  <div class="right" id="actions"></div>
</div>
<div id="stage"></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<input type="file" id="fileInput" accept="application/pdf" style="display:none" />
<input type="file" id="pkgInput" accept=".json,application/json" style="display:none" />
<script>
"use strict";
/* ============================================================================
   DeoDap eSign — single-file e-signature tool (runs 100% in the browser).
   Prepare a PDF, place resizable fields, email a "signing package" to a signer;
   the signer signs and emails the finished PDF straight back to you.
   ============================================================================ */

/* ---- CONFIG: edit these two lines ---- */
const CONFIG = {
  // Inbox that should receive completed/signed documents (used in messages + mailto fallback).
  sendBackEmail: "27@deodap.com",
  // OPTIONAL — paste a free Web3Forms access key (https://web3forms.com, created with the
  // inbox above). If set, the signer's "Email signed copy" button delivers the PDF to you
  // automatically. Leave "" to use the no-setup fallback (opens the signer's mail app).
  web3formsKey: ""
};

const PDFJS = window.pdfjsLib;
PDFJS.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
const COLORS = ["#2563eb","#db2777","#16a34a","#d97706","#7c3aed","#0891b2","#dc2626","#4f46e5"];
const DEFAULTS = {signature:{w:0.22,h:0.07},initials:{w:0.10,h:0.06},date:{w:0.16,h:0.035},name:{w:0.20,h:0.035},email:{w:0.22,h:0.035},text:{w:0.20,h:0.035},checkbox:{w:0.03,h:0.03}};
const LABELS = {signature:"Signature",initials:"Initials",date:"Date signed",name:"Full name",email:"Email",text:"Text",checkbox:"☑ Checkbox"};
const TYPES = Object.keys(LABELS);
const S = { fileName:"", pdfBytes:null, mode:"prepare", signers:[], fields:[], pageInfos:[], activeSignerId:null, activeType:"signature", signingAs:null, sendBackEmail:"", isSigner:false };

const $ = (s,r)=> (r||document).querySelector(s);
function el(tag,attrs){ const n=document.createElement(tag); attrs=attrs||{};
  for(const k in attrs){ const v=attrs[k]; if(v==null)continue;
    if(k==="class")n.className=v; else if(k==="html")n.innerHTML=v;
    else if(k.slice(0,2)==="on"&&typeof v==="function")n.addEventListener(k.slice(2),v);
    else n.setAttribute(k,v); }
  for(let i=2;i<arguments.length;i++){ let kid=arguments[i]; if(kid==null)continue;
    if(Array.isArray(kid))kid.forEach(c=>c!=null&&n.append(c.nodeType?c:document.createTextNode(c)));
    else n.append(kid.nodeType?kid:document.createTextNode(kid)); }
  return n; }
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const hexA=(hex,a)=>{const n=parseInt(hex.slice(1),16);return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";};
function toast(msg,err){ let t=$("#toast"); if(!t){t=el("div",{id:"toast"});document.body.append(t);} t.textContent=msg; t.className=err?"err show":"show"; clearTimeout(t._t); t._t=setTimeout(()=>t.className="",3200); }
const overlay=$("#overlay"), modal=$("#modal");
const closeModal=()=>overlay.classList.remove("show");
overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});

renderStart();
$("#fileInput").addEventListener("change",e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });
$("#pkgInput").addEventListener("change",e=>{ if(e.target.files[0]) loadEnvelope(e.target.files[0]); });

function renderStart(){
  S.pdfBytes=null; S.isSigner=false; S.mode="prepare"; renderActions();
  const dz = el("div",{class:"dropzone",id:"dz"},
    el("div",{style:"font-size:46px"},"🖋️"),
    el("h2",{style:"margin:10px 0 4px"},"DeoDap eSign"),
    el("div",{class:"muted",style:"margin-bottom:22px"},"Prepare a PDF for signing, or open a signing package someone emailed you. Everything runs in your browser."),
    el("div",{class:"flex",style:"justify-content:center;gap:10px;flex-wrap:wrap"},
      el("button",{class:"btn primary",onclick:()=>$("#fileInput").click()},"Choose PDF to prepare"),
      el("button",{class:"btn",onclick:()=>$("#pkgInput").click()},"Open signing package")));
  dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag");});
  dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));
  dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag"); const f=e.dataTransfer.files[0]; if(!f)return; if(/\.json$/i.test(f.name)||f.type==="application/json")loadEnvelope(f); else loadFile(f);});
  $("#stage").innerHTML=""; $("#stage").append(dz);
}
async function loadFile(file){
  if(file.type!=="application/pdf" && !/\.pdf$/i.test(file.name)){ toast("Please choose a PDF file",true); return; }
  S.fileName=file.name.replace(/\.pdf$/i,"");
  S.pdfBytes=await file.arrayBuffer();
  S.signers=[]; S.fields=[]; S.activeSignerId=null; S.mode="prepare"; S.isSigner=false; S.sendBackEmail="";
  await renderPrepare();
}
function renderActions(){
  const a=$("#actions"); a.innerHTML="";
  if(!S.pdfBytes){ a.append(el("span",{class:"muted small"},"100% private · runs in your browser")); return; }
  if(S.mode==="prepare"){
    a.append(el("span",{class:"muted small"},esc(S.fileName)),
      el("button",{class:"btn sm",onclick:renderStart},"New PDF"),
      el("button",{class:"btn primary sm",onclick:startSigning},"Sign it myself →"));
  } else {
    const sel=el("select",{style:"width:auto",onchange:e=>{S.signingAs=e.target.value;paintSignerFields();}});
    S.signers.forEach(s=> sel.append(el("option",{value:s.id,selected:s.id===S.signingAs?"selected":null}, "Signing as: "+s.name)));
    a.append(sel);
    if(!S.isSigner) a.append(el("button",{class:"btn sm",onclick:backToPrepare},"← Edit fields"));
    a.append(el("button",{class:"btn green sm",onclick:finishAndDownload}, S.isSigner?"✓ Finish & send":"✓ Finish"));
  }
}
async function renderPrepare(){
  S.mode="prepare"; renderActions();
  const sidebar=el("div",{class:"sidebar"},
    el("h3",{style:"margin-top:0"},"Signers"),
    el("div",{id:"recipList"}),
    el("div",{class:"row2"}, el("input",{id:"rName",type:"text",placeholder:"Name"}), el("input",{id:"rEmail",type:"email",placeholder:"Email (optional)"})),
    el("button",{class:"btn sm",style:"margin-top:8px;width:100%",onclick:addSigner},"+ Add signer"),
    el("h3",{},"Fields"),
    el("div",{class:"muted small",style:"margin-bottom:8px"},"Pick a signer, pick a field, then click the page to place it. Drag to move, drag the corner to resize."),
    el("div",{class:"palette",id:"palette"}),
    el("label",{class:"flex",style:"gap:8px;margin-top:10px"}, el("input",{type:"checkbox",id:"reqToggle",checked:"checked",style:"width:auto"}), "New fields are required"),
    el("h3",{},"Send for signature"),
    el("label",{class:"fld"}, el("span",{},"Email signed copy to"), el("input",{id:"sendBack",type:"email",value:S.sendBackEmail||CONFIG.sendBackEmail})),
    el("button",{class:"btn sm primary",style:"width:100%;margin-bottom:6px",onclick:exportEnvelope},"⬇ Create signing package"),
    el("button",{class:"btn sm",style:"width:100%",onclick:emailSigningRequest},"✉ Email signing request"),
    el("div",{class:"hintbox"},"Creates a package file. Email it to your signer; they open it here, sign, and email the signed PDF back to you."));
  const area=el("div",{class:"canvas-area",id:"canvas"});
  $("#stage").innerHTML=""; $("#stage").append(el("div",{class:"workspace"},sidebar,area));
  buildPalette(); renderSigners();
  $("#rEmail").addEventListener("keydown",e=>{if(e.key==="Enter")addSigner();});
  if(!S.signers.length){ S.signers.push({id:"s1",name:"Signer 1",email:"",color:COLORS[0]}); S.activeSignerId="s1"; renderSigners(); }
  const targetWidth=Math.min(840,Math.max(460,area.clientWidth-52));
  S.pageInfos=await renderPdf(S.pdfBytes,area,targetWidth);
  S.pageInfos.forEach(pg=> pg.wrap.addEventListener("click",e=>{ if(!e.target.closest(".field")) placeField(pg,e); }));
  S.fields.forEach(drawField);
}
function syncSendBack(){ const i=$("#sendBack"); if(i) S.sendBackEmail=i.value.trim(); }
function addSigner(){
  const name=$("#rName").value.trim(), email=$("#rEmail").value.trim();
  if(!name){ toast("Enter a name",true); return; }
  const s={id:"s"+(Date.now()),name,email,color:COLORS[S.signers.length%COLORS.length]};
  S.signers.push(s); S.activeSignerId=s.id; $("#rName").value="";$("#rEmail").value=""; renderSigners();
}
function renderSigners(){
  const list=$("#recipList"); if(!list)return; list.innerHTML="";
  S.signers.forEach((r,i)=>{
    list.append(el("div",{class:"recip-item"+(r.id===S.activeSignerId?" active":""),onclick:()=>{S.activeSignerId=r.id;renderSigners();}},
      el("span",{class:"swatch",style:"background:"+r.color}),
      el("div",{class:"info"}, el("b",{},(i+1)+". "+r.name), el("div",{class:"small muted"}, r.email||"no email")),
      el("button",{class:"x",style:"font-size:18px",title:"Remove",onclick:e=>{e.stopPropagation();removeSigner(r.id);}},"×")));
  });
}
function removeSigner(id){
  if(S.signers.length<=1){ toast("Keep at least one signer",true); return; }
  S.signers=S.signers.filter(s=>s.id!==id);
  S.fields.filter(f=>f.signerId===id).forEach(f=>f._node&&f._node.remove());
  S.fields=S.fields.filter(f=>f.signerId!==id);
  if(S.activeSignerId===id)S.activeSignerId=S.signers[0].id;
  renderSigners();
}
function buildPalette(){
  const p=$("#palette"); p.innerHTML="";
  TYPES.forEach(t=> p.append(el("button",{class:t===S.activeType?"active":"",onclick:()=>{S.activeType=t;buildPalette();}},LABELS[t])));
}
function placeField(pg,e){
  if(!S.activeSignerId){ toast("Add a signer first",true); return; }
  const rect=pg.wrap.getBoundingClientRect();
  const px=e.clientX-rect.left, py=e.clientY-rect.top;
  const d=DEFAULTS[S.activeType]; let wPct=d.w, hPct=d.h;
  if(S.activeType==="checkbox") hPct=(d.w*pg.width)/pg.height;
  const wpx=wPct*pg.width, hpx=hPct*pg.height;
  const left=Math.max(0,Math.min(pg.width-wpx,px-wpx/2)), top=Math.max(0,Math.min(pg.height-hpx,py-hpx/2));
  const f={id:"f"+(Date.now())+Math.random().toString(36).slice(2,6),signerId:S.activeSignerId,page:pg.index,xPct:left/pg.width,yPct:top/pg.height,wPct,hPct,required:$("#reqToggle").checked,type:S.activeType,value:null};
  S.fields.push(f); drawField(f);
}
const signerColor=id=>(S.signers.find(s=>s.id===id)||{}).color||"#64748b";
function drawField(f){
  const pg=S.pageInfos[f.page]; if(!pg)return;
  const c=signerColor(f.signerId);
  const node=el("div",{class:"field"});
  node.style.left=(f.xPct*pg.width)+"px"; node.style.top=(f.yPct*pg.height)+"px";
  node.style.width=(f.wPct*pg.width)+"px"; node.style.height=(f.hPct*pg.height)+"px";
  node.style.borderColor=c; node.style.background=hexA(c,0.12); node.style.color=c;
  node.title=(S.signers.find(s=>s.id===f.signerId)||{}).name||"";
  node.append(el("span",{class:"lbl"},LABELS[f.type]+(f.required?"":" (opt)")));
  node.append(el("button",{class:"del",title:"Remove",onclick:ev=>{ev.stopPropagation();removeField(f);}},"×"));
  const rz=el("div",{class:"rz",title:"Drag to resize"}); rz.addEventListener("mousedown",ev=>startResize(ev,f,node)); node.append(rz);
  node.addEventListener("mousedown",ev=>startDrag(ev,f,node));
  f._node=node; pg.wrap.append(node);
}
function removeField(f){ f._node&&f._node.remove(); S.fields=S.fields.filter(x=>x!==f); }
function startDrag(e,f,node){
  if(e.target.classList.contains("del")||e.target.classList.contains("rz"))return; e.preventDefault();
  const pg=S.pageInfos[f.page], sx=e.clientX, sy=e.clientY, ol=parseFloat(node.style.left), ot=parseFloat(node.style.top), w=node.offsetWidth, h=node.offsetHeight;
  const move=ev=>{ const nl=Math.max(0,Math.min(pg.width-w,ol+ev.clientX-sx)), nt=Math.max(0,Math.min(pg.height-h,ot+ev.clientY-sy)); node.style.left=nl+"px"; node.style.top=nt+"px"; };
  const up=()=>{ document.removeEventListener("mousemove",move); document.removeEventListener("mouseup",up); f.xPct=parseFloat(node.style.left)/pg.width; f.yPct=parseFloat(node.style.top)/pg.height; };
  document.addEventListener("mousemove",move); document.addEventListener("mouseup",up);
}
function startResize(e,f,node){
  e.preventDefault(); e.stopPropagation();
  const pg=S.pageInfos[f.page], sx=e.clientX, sy=e.clientY, ow=node.offsetWidth, oh=node.offsetHeight;
  const left=parseFloat(node.style.left), top=parseFloat(node.style.top);
  const move=ev=>{
    const nw=Math.max(24,Math.min(pg.width-left, ow+ev.clientX-sx));
    const nh=Math.max(14,Math.min(pg.height-top, oh+ev.clientY-sy));
    node.style.width=nw+"px"; node.style.height=nh+"px";
  };
  const up=()=>{ document.removeEventListener("mousemove",move); document.removeEventListener("mouseup",up);
    f.wPct=parseFloat(node.style.width)/pg.width; f.hPct=parseFloat(node.style.height)/pg.height; };
  document.addEventListener("mousemove",move); document.addEventListener("mouseup",up);
}
function startSigning(){ if(!S.fields.length){ toast("Place at least one field first",true); return; } syncSendBack(); S.signingAs=S.signers[0].id; renderSign(); }
function backToPrepare(){ renderPrepare(); }
async function renderSign(){
  S.mode="sign"; renderActions();
  const area=el("div",{class:"canvas-area",id:"canvas"});
  const note = S.isSigner
    ? "Please complete the highlighted fields, then click “Finish & send” to email the signed copy back."
    : "Fill the highlighted fields for the selected signer; switch signer (top-right) for other parties, then Finish.";
  const help=el("div",{style:"padding:14px 24px 0"}, el("div",{class:"banner info",style:"margin:0"}, note));
  $("#stage").innerHTML=""; $("#stage").append(help,area);
  const targetWidth=Math.min(840,Math.max(460,area.clientWidth-52));
  S.pageInfos=await renderPdf(S.pdfBytes,area,targetWidth);
  S.fields.forEach(buildSignField);
  paintSignerFields();
}
function defaultFor(f){ if(f.type==="date")return new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  const s=S.signers.find(x=>x.id===f.signerId)||{}; if(f.type==="name")return s.name||""; if(f.type==="email")return s.email||""; return ""; }
function buildSignField(f){
  const pg=S.pageInfos[f.page]; if(!pg)return;
  const node=el("div",{class:"sfield todo"});
  node.style.left=(f.xPct*pg.width)+"px"; node.style.top=(f.yPct*pg.height)+"px";
  node.style.width=(f.wPct*pg.width)+"px"; node.style.height=(f.hPct*pg.height)+"px";
  f._node=node; pg.wrap.append(node);
  if(f.value==null && f.type!=="signature" && f.type!=="initials" && f.type!=="checkbox") f.value=defaultFor(f);
  renderFieldContents(f);
}
function renderFieldContents(f){
  const node=f._node; node.innerHTML=""; node.onclick=null;
  const mine = f.signerId===S.signingAs;
  if(f.type==="signature"||f.type==="initials"){
    if(f.value){ node.append(el("img",{src:f.value})); }
    else node.textContent=f.type==="initials"?"Initials":"Sign";
    if(mine) node.onclick=async()=>{ const s=S.signers.find(x=>x.id===f.signerId)||{}; const url=await openSignaturePad(f.type==="initials"?"":s.name); if(url){ f.value=url; markSigned(f); renderFieldContents(f); paintSignerFields(); } };
  } else if(f.type==="checkbox"){
    const cb=el("input",{type:"checkbox",style:"width:18px;height:18px;cursor:pointer"}); cb.checked=!!f.value; cb.disabled=!mine;
    cb.onchange=()=>{ f.value=cb.checked; markSigned(f); updateFieldClass(f); };
    node.append(cb);
  } else {
    const input=el("input",{type:"text",value:f.value||""}); input.disabled=!mine;
    input.placeholder=f.type==="name"?"Full name":f.type==="email"?"Email":f.type==="date"?"Date":"Type here";
    input.oninput=()=>{ f.value=input.value; markSigned(f); updateFieldClass(f); };
    node.append(input);
  }
}
function markSigned(f){ const s=S.signers.find(x=>x.id===f.signerId); if(s&&hasVal(f)&&!s.signedAt)s.signedAt=new Date().toISOString(); }
const hasVal=f=>!(f.value==null||f.value===""||f.value===false);
function paintSignerFields(){ renderActions(); S.fields.forEach(f=>{ if(!f._node)return; updateFieldClass(f); renderFieldContents(f); }); }
function updateFieldClass(f){ if(!f._node)return; const mine=f.signerId===S.signingAs;
  f._node.classList.toggle("other",!mine && !hasVal(f));
  f._node.classList.toggle("todo",mine && !hasVal(f));
  f._node.classList.toggle("done",hasVal(f)); }

async function finishAndDownload(){
  const missing=S.fields.find(f=>f.required&&!hasVal(f));
  if(missing){ const who=(S.signers.find(s=>s.id===missing.signerId)||{}).name;
    toast("A required field for "+who+" is empty",true);
    S.signingAs=missing.signerId; paintSignerFields();
    missing._node.scrollIntoView({behavior:"smooth",block:"center"});
    missing._node.animate([{boxShadow:"0 0 0 3px rgba(220,38,38,.6)"},{boxShadow:"none"}],{duration:900});
    return;
  }
  try{ const bytes=await stampPdf(); downloadBytes(bytes,(S.fileName||"document")+"-signed.pdf"); doneScreen(bytes); }
  catch(e){ console.error(e); toast("Could not generate PDF: "+e.message,true); }
}
function downloadBytes(bytes,name){ const blob=new Blob([bytes],{type:"application/pdf"}); const url=URL.createObjectURL(blob); const a=el("a",{href:url,download:name}); document.body.append(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),4000); }

const firstSignerEmail=()=>{const s=S.signers.find(x=>x.email);return s?s.email:"";};
async function sendBack(bytes){
  const to=S.sendBackEmail||CONFIG.sendBackEmail;
  if(CONFIG.web3formsKey){
    try{ toast("Sending…"); await sendViaWeb3Forms(bytes,to); toast("Signed copy emailed to "+to); return; }
    catch(e){ toast("Auto-send failed: "+e.message+" — opening your mail app",true); }
  }
  sendViaMailto(to);
}
async function sendViaWeb3Forms(bytes,to){
  const fd=new FormData();
  fd.append("access_key",CONFIG.web3formsKey);
  fd.append("subject","Signed document: "+S.fileName);
  fd.append("from_name","DeoDap eSign");
  fd.append("email", firstSignerEmail()||to);
  fd.append("message","Signed copy of \""+S.fileName+"\" attached.\nSigners: "+S.signers.map(s=>s.name+(s.email?" <"+s.email+">":"")).join(", "));
  fd.append("attachment", new File([bytes],(S.fileName||"document")+"-signed.pdf",{type:"application/pdf"}));
  const r=await fetch("https://api.web3forms.com/submit",{method:"POST",body:fd});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||!j.success) throw new Error(j.message||("HTTP "+r.status));
}
function sendViaMailto(to){
  const subject=encodeURIComponent("Signed document: "+S.fileName);
  const body=encodeURIComponent("Hi,\n\nI've signed \""+S.fileName+"\". The signed PDF was downloaded to my device as \""+(S.fileName||"document")+"-signed.pdf\". Please find it attached (attach that file before sending).\n\nThanks,\n"+S.signers.map(s=>s.name).join(", "));
  window.location.href="mailto:"+encodeURIComponent(to)+"?subject="+subject+"&body="+body;
}
function emailSigningRequest(){
  if(!S.fields.length){ toast("Place at least one field first",true); return; }
  exportEnvelope();
  const signer=S.signers[0];
  const to=signer&&signer.email?signer.email:"";
  const link=location.href.split("?")[0].split("#")[0];
  const subject=encodeURIComponent("Please sign: "+S.fileName);
  const body=encodeURIComponent("Hi "+(signer?signer.name:"")+",\n\nPlease sign \""+S.fileName+"\":\n\n1. Save the attached signing package ("+(S.fileName||"document")+".esign.json).\n2. Open: "+link+"\n3. Click \"Open signing package\", choose the saved file, complete your fields, then click \"Email signed copy\".\n\nThank you!");
  setTimeout(()=>{ toast("Attach the downloaded package, then send"); window.location.href="mailto:"+(to?encodeURIComponent(to):"")+"?subject="+subject+"&body="+body; },400);
}
function exportEnvelope(){
  if(!S.fields.length){ toast("Place at least one field first",true); return; }
  syncSendBack();
  const env={v:1,fileName:S.fileName,sendBackEmail:S.sendBackEmail||CONFIG.sendBackEmail,
    signers:S.signers.map(s=>({id:s.id,name:s.name,email:s.email,color:s.color})),
    fields:S.fields.map(f=>({id:f.id,signerId:f.signerId,page:f.page,xPct:f.xPct,yPct:f.yPct,wPct:f.wPct,hPct:f.hPct,required:f.required,type:f.type})),
    pdf:abToB64(S.pdfBytes)};
  const blob=new Blob([JSON.stringify(env)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=el("a",{href:url,download:(S.fileName||"document")+".esign.json"}); document.body.append(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),4000);
  toast("Signing package downloaded");
}
async function loadEnvelope(file){
  try{
    const env=JSON.parse(await file.text());
    if(!env.pdf||!Array.isArray(env.fields))throw new Error("not a valid signing package");
    S.fileName=env.fileName||"document"; S.pdfBytes=b64ToAb(env.pdf);
    S.signers=(env.signers&&env.signers.length)?env.signers:[{id:"s1",name:"Signer",email:"",color:COLORS[0]}];
    S.fields=env.fields.map(f=>Object.assign({},f,{value:null}));
    S.sendBackEmail=env.sendBackEmail||CONFIG.sendBackEmail;
    S.isSigner=true; S.signingAs=S.signers[0].id; S.mode="sign";
    await renderSign();
  }catch(e){ toast("Could not open package: "+e.message,true); }
}
function abToB64(buf){ const bytes=new Uint8Array(buf); let bin=""; const ch=0x8000; for(let i=0;i<bytes.length;i+=ch){ bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch)); } return btoa(bin); }
function b64ToAb(b64){ const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u.buffer; }

async function stampPdf(){
  const {PDFDocument,StandardFonts,rgb}=window.PDFLib;
  const pdf=await PDFDocument.load(S.pdfBytes,{ignoreEncryption:true});
  const pages=pdf.getPages();
  const helv=await pdf.embedFont(StandardFonts.Helvetica);
  const helvB=await pdf.embedFont(StandardFonts.HelveticaBold);
  for(const f of S.fields){
    if(!hasVal(f))continue; const page=pages[f.page]; if(!page)continue;
    const pw=page.getWidth(), ph=page.getHeight();
    const x=pw*f.xPct, w=pw*f.wPct, h=ph*f.hPct, y=ph-ph*f.yPct-h;
    if((f.type==="signature"||f.type==="initials")&&String(f.value).startsWith("data:image")){
      const png=await pdf.embedPng(dataURLtoBytes(f.value));
      const ar=png.width/png.height; let dw=w,dh=w/ar; if(dh>h){dh=h;dw=h*ar;}
      page.drawImage(png,{x:x+(w-dw)/2,y:y+(h-dh)/2,width:dw,height:dh});
    } else if(f.type==="checkbox"){
      if(f.value) page.drawText("X",{x:x+1,y:y+1,size:Math.min(h,16),font:helvB,color:rgb(.1,.1,.1)});
    } else {
      const size=Math.max(8,Math.min(13,h*0.62));
      page.drawText(String(f.value),{x:x+2,y:y+(h-size)/2+1,size,font:helv,color:rgb(.06,.09,.25)});
    }
  }
  await addCertificate(pdf,helv,helvB);
  return pdf.save();
}
async function addCertificate(pdf,helv,helvB){
  const {rgb}=window.PDFLib;
  const page=pdf.addPage([612,792]); let y=page.getHeight()-58; const left=50;
  const hash=await sha256Hex(S.pdfBytes);
  const line=(s,o)=>{o=o||{};page.drawText(String(s),{x:o.x||left,y,size:o.size||10,font:o.bold?helvB:helv,color:o.color||rgb(.12,.12,.16)});y-=o.gap||16;};
  page.drawText("Certificate of Completion",{x:left,y,size:19,font:helvB,color:rgb(.12,.16,.42)}); y-=14;
  page.drawLine({start:{x:left,y},end:{x:562,y},thickness:1,color:rgb(.85,.87,.92)}); y-=22;
  line("Document: "+S.fileName,{bold:true});
  line("Completed: "+new Date().toUTCString());
  line("Signed using: DeoDap eSign (browser)");
  line("Original document SHA-256:",{gap:12}); line(hash,{size:8,color:rgb(.4,.4,.45),gap:22});
  line("Signers",{bold:true,size:13,gap:20});
  S.signers.forEach((s,i)=>{
    const signed=S.fields.some(f=>f.signerId===s.id&&hasVal(f));
    line((i+1)+".  "+s.name+(s.email?"  <"+s.email+">":""),{bold:true});
    line("     "+(signed?"Signed electronically on "+new Date(s.signedAt||Date.now()).toUTCString():"No fields completed"),{size:9,color:rgb(.3,.3,.35)});
    y-=6;
  });
  y=Math.max(y,70);
  page.drawText("This certificate records the electronic signing of the document above (timestamps in UTC).",{x:left,y,size:8,font:helv,color:rgb(.5,.5,.55)});
  page.drawText("Signatures were applied in-browser with DeoDap eSign.",{x:left,y:y-11,size:8,font:helv,color:rgb(.5,.5,.55)});
}
function doneScreen(bytes){
  const to=S.sendBackEmail||CONFIG.sendBackEmail;
  $("#stage").innerHTML="";
  $("#stage").append(el("div",{class:"done-screen"},
    el("div",{style:"font-size:48px"},"✓"),
    el("h2",{style:"margin:6px 0"},"Signed!"),
    el("p",{class:"muted"},"A signed PDF with a Certificate of Completion has been downloaded to your device."),
    el("div",{class:"flex",style:"justify-content:center;gap:10px;margin-top:8px;flex-wrap:wrap"},
      el("button",{class:"btn green",onclick:()=>sendBack(bytes)},"✉ Email signed copy"),
      el("button",{class:"btn",onclick:()=>downloadBytes(bytes,(S.fileName||"document")+"-signed.pdf")},"↓ Download again"),
      el("button",{class:"btn",onclick:renderStart},"Start over")),
    el("div",{class:"hintbox",style:"text-align:left"},"“Email signed copy” sends to "+esc(to)+". With a Web3Forms key set it sends automatically; otherwise it opens your mail app with the file ready to attach.")));
}
async function renderPdf(bytes,mount,targetWidth){
  const doc=await PDFJS.getDocument({data:bytes.slice(0)}).promise;
  mount.innerHTML=""; const out=[];
  for(let i=1;i<=doc.numPages;i++){
    const page=await doc.getPage(i);
    const base=page.getViewport({scale:1}); const scale=targetWidth/base.width; const vp=page.getViewport({scale});
    const canvas=el("canvas"); canvas.width=vp.width; canvas.height=vp.height;
    const wrap=el("div",{class:"page-wrap"},canvas); wrap.style.width=vp.width+"px"; wrap.style.height=vp.height+"px"; mount.append(wrap);
    await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
    out.push({wrap,index:i-1,width:vp.width,height:vp.height});
  }
  return out;
}
function dataURLtoBytes(d){ const b=atob(d.split(",")[1]); const u=new Uint8Array(b.length); for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i); return u; }
async function sha256Hex(buf){ const h=await crypto.subtle.digest("SHA-256",buf.slice(0)); return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join(""); }
function openSignaturePad(defaultName){
  return new Promise(resolve=>{
    const canvas=el("canvas",{class:"pad-canvas"});
    const typeInput=el("input",{type:"text",value:defaultName||"",placeholder:"Type your name"});
    const typePrev=el("div",{class:"type-preview"});
    const drawPane=el("div",{},el("div",{class:"muted small",style:"margin-bottom:8px"},"Draw your signature below"),canvas);
    const typePane=el("div",{style:"display:none"},el("label",{class:"fld"},el("span",{},"Type your signature"),typeInput),typePrev);
    const tabDraw=el("button",{class:"btn sm primary"},"Draw"), tabType=el("button",{class:"btn sm"},"Type");
    let mode="draw";
    const setMode=m=>{mode=m;tabDraw.className="btn sm"+(m==="draw"?" primary":"");tabType.className="btn sm"+(m==="type"?" primary":"");drawPane.style.display=m==="draw"?"":"none";typePane.style.display=m==="type"?"":"none";};
    tabDraw.onclick=()=>setMode("draw"); tabType.onclick=()=>setMode("type");
    const renderType=()=>{typePrev.style.fontFamily="'Brush Script MT','Segoe Script',cursive";typePrev.textContent=typeInput.value||"Your name";};
    typeInput.addEventListener("input",renderType); renderType();
    const ov=el("div",{class:"overlay show"},
      el("div",{class:"modal",style:"max-width:520px"},
        el("div",{class:"head"},el("h3",{},"Add your signature"),el("button",{class:"x",onclick:()=>done(null)},"×")),
        el("div",{class:"body"},
          el("div",{class:"pad-tabs"},tabDraw,tabType),drawPane,typePane,
          el("div",{class:"flex between",style:"margin-top:16px"},
            el("button",{class:"btn sm",onclick:()=>clear()},"Clear"),
            el("div",{class:"flex"},el("button",{class:"btn",onclick:()=>done(null)},"Cancel"),el("button",{class:"btn primary",onclick:()=>accept()},"Apply"))))));
    document.body.append(ov);
    const ctx=canvas.getContext("2d"); let drawing=false,dirty=false,last=null;
    const resize=()=>{const r=canvas.getBoundingClientRect();const data=dirty?ctx.getImageData(0,0,canvas.width,canvas.height):null;canvas.width=r.width;canvas.height=r.height;ctx.lineWidth=2.4;ctx.lineCap="round";ctx.strokeStyle="#13294b";if(data)ctx.putImageData(data,0,0);};
    setTimeout(resize,30);
    const pos=e=>{const r=canvas.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:p.clientX-r.left,y:p.clientY-r.top};};
    const start=e=>{drawing=true;last=pos(e);e.preventDefault();};
    const move=e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;dirty=true;e.preventDefault();};
    const end=()=>drawing=false;
    canvas.addEventListener("mousedown",start);canvas.addEventListener("mousemove",move);window.addEventListener("mouseup",end);
    canvas.addEventListener("touchstart",start);canvas.addEventListener("touchmove",move);canvas.addEventListener("touchend",end);
    function clear(){ctx.clearRect(0,0,canvas.width,canvas.height);dirty=false;typeInput.value="";renderType();}
    function accept(){ let url=null;
      if(mode==="draw"){ if(!dirty){toast("Please draw your signature first",true);return;} url=trimCanvas(canvas); }
      else { const t=typeInput.value.trim(); if(!t){toast("Please type your name",true);return;} url=textToPng(t); }
      done(url); }
    function done(v){ canvas.removeEventListener("mousedown",start);canvas.removeEventListener("mousemove",move);window.removeEventListener("mouseup",end); ov.remove(); resolve(v); }
  });
}
function textToPng(txt){ const c=el("canvas");c.width=600;c.height=200;const x=c.getContext("2d");x.fillStyle="#13294b";x.textAlign="center";x.textBaseline="middle";x.font="64px 'Brush Script MT','Segoe Script',cursive";x.fillText(txt,c.width/2,c.height/2);return trimCanvas(c); }
function trimCanvas(canvas){ const ctx=canvas.getContext("2d"),w=canvas.width,h=canvas.height,d=ctx.getImageData(0,0,w,h).data;
  let top=h,left=w,right=0,bottom=0,found=false;
  for(let yy=0;yy<h;yy++)for(let xx=0;xx<w;xx++){if(d[(yy*w+xx)*4+3]>8){found=true;if(yy<top)top=yy;if(yy>bottom)bottom=yy;if(xx<left)left=xx;if(xx>right)right=xx;}}
  if(!found)return canvas.toDataURL("image/png");
  const pad=6;top=Math.max(0,top-pad);left=Math.max(0,left-pad);right=Math.min(w,right+pad);bottom=Math.min(h,bottom+pad);
  const out=el("canvas");out.width=right-left;out.height=bottom-top;out.getContext("2d").drawImage(canvas,left,top,out.width,out.height,0,0,out.width,out.height);
  return out.toDataURL("image/png");
}
